name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: BUNDLE_WITHOUT=development:test

      - name: Deploy via Portainer API
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
          STACK_NAME: marketwatcher
        run: |
          # Récupère l'ID, l'endpointId et les variables d'environnement du stack
          STACKS=$(curl -sf -H "X-API-Key: $PORTAINER_TOKEN" "$PORTAINER_URL/api/stacks")
          STACK=$(echo "$STACKS" | jq '.[] | select(.Name == "'"$STACK_NAME"'")')
          STACK_ID=$(echo "$STACK" | jq -r '.Id')
          ENDPOINT_ID=$(echo "$STACK" | jq -r '.EndpointId')
          STACK_ENV=$(echo "$STACK" | jq '.Env // []')

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack '$STACK_NAME' introuvable dans Portainer."
            exit 1
          fi

          echo "Stack ID=$STACK_ID  EndpointID=$ENDPOINT_ID"

          # Récupère le contenu actuel du docker-compose stocké dans Portainer
          STACK_FILE=$(curl -sf \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/file" | jq -r '.StackFileContent')

          # Redéploie en préservant les variables d'environnement Portainer
          curl -sf -X PUT \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -d "{\"stackFileContent\": $(echo "$STACK_FILE" | jq -Rs .), \"env\": $STACK_ENV, \"pullImage\": true, \"prune\": false}" \
            | jq -r '"Status: " + (.Status | tostring)'
