version: '3.8'

x-env: &env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ANALYSIS_DAY: ${ANALYSIS_DAY:-1}
  ANALYSIS_HOUR: ${ANALYSIS_HOUR:-7}
  SECTORS: ${SECTORS:-energie,tech,defense,industrie,alimentation}
  DEFAULT_BUDGET: ${DEFAULT_BUDGET:-50}
  APP_SECRET: ${APP_SECRET}
  TRIGGER_TOKEN: ${TRIGGER_TOKEN}
  APP_PASSWORD: ${APP_PASSWORD}
  SURE_API_URL: ${SURE_API_URL:-https://sur.cizeron.me}
  SURE_API_KEY: ${SURE_API_KEY:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
  PERMITTED_HOSTS: ${PERMITTED_HOSTS:-marketwatcher.cizeron.me}
  PORT: "4567"
  DATABASE_PATH: db/marketwatch.db

services:
  app:
    image: ghcr.io/marc-cizeron/marketwatcher:latest
    pull_policy: always
    ports:
      - "4567:4567"
    environment:
      <<: *env
    volumes:
      - marketwatch_db:/app/db
    restart: unless-stopped

  clock:
    image: ghcr.io/marc-cizeron/marketwatcher:latest
    pull_policy: always
    command: bundle exec clockwork config/schedule.rb
    environment:
      <<: *env
    volumes:
      - marketwatch_db:/app/db
    restart: unless-stopped
    depends_on:
      - app

volumes:
  marketwatch_db:
